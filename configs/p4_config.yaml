run_name: default_real_mixed
data_mode: real
strategy_type: cointegration

paths:
  cache_dir: /Volumes/Crucial X9/data/market_data/p4
  results_dir: results
  fixture_dir: tests/fixtures
  alpha_trace_dir: docs/alpha_engine_trace

market:
  data_start: 2016-01-01
  data_end: 2025-12-31
  snapshot_period: 3mo
  price_batch_size: 80
  etf_universe:
    - SPY
    - QQQ
    - IWM
    - DIA
    - XLK
    - XLF
    - XLE
    - XLU
    - XLP
    - XLY
    - XLI
    - XLV
    - XLB
    - XLC
    - VNQ
    - XBI
    - SMH
    - KRE
    - HYG
    - TLT

selection:
  max_equities: 30
  min_price: 5.0
  min_adtv_usd: 25000000.0
  min_pair_correlation: 0.6
  max_pairs_per_family: 6
  max_baskets_per_family: 3

cointegration:
  engle_granger_alpha: 0.05
  johansen_alpha: 0.05

ou:
  half_life_min_days: 5.0
  half_life_max_days: 30.0

signal:
  entry_z: 2.0
  exit_z: 0.5
  stop_z: 4.0

backtest:
  cost_halfspread_bps: 5.0
  cost_slippage_bps: 3.0
  borrow_cost_annual_bps: 50.0
  capacity_adv_fraction: 0.05
  portfolio_capital_usd: 10000000.0

walkforward:
  formation_days: 504
  validation_days: 126
  test_days: 126
  step_days: 126

eigenportfolio:
  pca_components: 15
  formation_window_days: 252
  min_half_life_days: 5.0
  max_half_life_days: 30.0
  z_entry: 1.5
  z_exit: 0.5
  z_stop: 3.0

multiple_testing:
  n_bootstrap: 300
  block_length_mode: ou_half_life
  alpha: 0.05
  random_seed: 42
